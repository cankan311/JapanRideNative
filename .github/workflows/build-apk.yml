name: Build Debug APK from ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          rm -rf build_project
          mkdir build_project
          unzip JapanRideNative_D67_01_with_actions.zip -d build_project
          find build_project -maxdepth 3 -type f | head -50

      - name: Find project directory
        id: find_project
        run: |
          PROJECT_DIR=$(find build_project -name "settings.gradle.kts" -exec dirname {} \; | head -1)
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Found project: $PROJECT_DIR"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JapanRide-debug-apk
          path: ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
